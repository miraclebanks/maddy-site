<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500">
  <!-- Background -->
  <rect width="1600" height="500" fill="#fbf6ec"/>

  <!-- Wordmark, centered, large -->
  <text x="800" y="270" font-family="Baskerville, Georgia, serif" font-size="170" font-style="italic" font-weight="400" fill="#1f3328" letter-spacing="-2" text-anchor="middle">Cakes &amp; Madness</text>

  <!-- Decorative line + flower flourish -->
  <line x1="450" y1="330" x2="740" y2="330" stroke="#557260" stroke-width="2"/>
  <g transform="translate(800 330)">
    <!-- small flower -->
    <circle cx="0" cy="-7" r="5" fill="#c9b8d9"/>
    <circle cx="6.6" cy="-2" r="5" fill="#b8d4e3"/>
    <circle cx="4" cy="5.6" r="5" fill="#c9b8d9"/>
    <circle cx="-4" cy="5.6" r="5" fill="#b8d4e3"/>
    <circle cx="-6.6" cy="-2" r="5" fill="#c9b8d9"/>
    <circle cx="0" cy="0" r="3.4" fill="#2f4a3a"/>
  </g>
  <line x1="860" y1="330" x2="1150" y2="330" stroke="#557260" stroke-width="2"/>

  <!-- Tagline -->
  <text x="800" y="395" font-family="Baskerville, Georgia, serif" font-size="32" font-style="italic" fill="#557260" text-anchor="middle" letter-spacing="3">handmade celebration cakes · small batch</text>
</svg>
